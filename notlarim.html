<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Çalışma Takip — Notlarım</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="notlarim" class="page-notlarim">
  <div class="shell">
    <aside class="sidebar" aria-label="Ana menü">
      <div class="sidebar__top">
        <a href="index.html" class="sidebar__brand">
          <span class="sidebar__logo" aria-hidden="true">◆</span>
          <span class="sidebar__app-name">Çalışma Takip</span>
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="index.html" class="sidebar__link">Ana sayfa</a>
        <a href="yeni-kayit.html" class="sidebar__link">Yeni kayıt</a>
        <a href="gecmis.html" class="sidebar__link">Geçmiş kayıtlar</a>
        <a href="yds.html" class="sidebar__link">YDS</a>
        <a href="kitaplar.html" class="sidebar__link">Kitaplar</a>
        <a href="notlarim.html" class="sidebar__link sidebar__link--active" aria-current="page">Notlarım</a>
        <a href="yatirim.html" class="sidebar__link">Yatırım</a>
        <a href="calendar.html" class="sidebar__link">Takvim</a>
        <a href="giris.html" class="sidebar__link">Giriş</a>
        <a href="ayarlar.html" class="sidebar__link">Ayarlar</a>
      </nav>
    </aside>

    <div class="shell__main">
      <header class="header">
        <div class="header__brand header__brand--compact">
          <div>
            <h1 class="header__page-title">Notlarım</h1>
          </div>
        </div>
        <div class="header__actions">
          <button type="button" class="btn btn--ghost" id="btn-export">Dışa aktar</button>
          <label class="btn btn--ghost btn--file">
            İçe aktar
            <input type="file" id="import-file" accept="application/json" hidden />
          </label>
        </div>
      </header>

      <div class="shell__content shell__content--notlarim" id="notlarim-root">
        <section class="panel panel--notlarim" aria-labelledby="notlarim-title">
          <div class="panel__head-row">
            <h2 id="notlarim-title" class="panel__h2">Kategoriler ve notlar</h2>
            <p class="panel__sub">Teknik konular, okunacak kitaplar — kendi başlıklarınızı ekleyin</p>
          </div>

          <div class="notlarim-layout">
            <aside class="notlarim-sidebar" aria-label="Kategori listesi">
              <div class="notlarim-cat-add">
                <label for="notes-new-category-title" class="sr-only">Yeni kategori adı</label>
                <input
                  type="text"
                  id="notes-new-category-title"
                  class="notlarim-input"
                  placeholder="Yeni kategori adı"
                  maxlength="120"
                  autocomplete="off"
                />
                <button type="button" class="btn btn--primary btn--small" id="notes-add-category">Ekle</button>
              </div>
              <ul id="notes-category-list" class="notlarim-cat-list"></ul>
            </aside>

            <div class="notlarim-main" id="notes-main-inner">
              <p class="notlarim-placeholder">Sol taraftan kategori seçin veya yeni kategori oluşturun.</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="js/sync-api.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
