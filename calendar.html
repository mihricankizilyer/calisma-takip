<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Çalışma Takip — Takvim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="calendar" class="page-calendar">
  <div class="shell">
    <aside class="sidebar" aria-label="Ana menü">
      <div class="sidebar__top">
        <a href="index.html" class="sidebar__brand">
          <span class="sidebar__logo" aria-hidden="true">◆</span>
          <span class="sidebar__app-name">Çalışma Takip</span>
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="index.html" class="sidebar__link">Ana sayfa</a>
        <a href="yeni-kayit.html" class="sidebar__link">Yeni kayıt</a>
        <a href="gecmis.html" class="sidebar__link">Geçmiş kayıtlar</a>
        <a href="yds.html" class="sidebar__link">YDS</a>
        <a href="teknik.html" class="sidebar__link">Teknik</a>
        <a href="kitaplar.html" class="sidebar__link">Kitaplar</a>
        <a href="notlarim.html" class="sidebar__link">Notlarım</a>
        <a href="yatirim.html" class="sidebar__link">Yatırım</a>
        <a href="calendar.html" class="sidebar__link sidebar__link--active" aria-current="page">Takvim</a>
        <a href="giris.html" class="sidebar__link">Giriş</a>
        <a href="ayarlar.html" class="sidebar__link">Ayarlar</a>
      </nav>
    </aside>

    <div class="shell__main">
      <header class="header">
        <div class="header__brand header__brand--compact">
          <div>
            <h1 class="header__page-title">Takvim</h1>
          </div>
        </div>
        <div class="header__actions">
          <a href="yeni-kayit.html" class="btn btn--primary">Kayıt ekle</a>
          <button type="button" class="btn btn--ghost" id="btn-export-cal" title="Veriyi JSON olarak indir">Dışa aktar</button>
          <label class="btn btn--ghost btn--file">
            İçe aktar
            <input type="file" id="import-file-cal" accept="application/json" hidden />
          </label>
        </div>
      </header>

      <div class="shell__content shell__content--calendar">
        <section class="panel calendar-page panel--calendar" aria-labelledby="cal-title">
          <div class="panel__head-row">
            <h2 id="cal-title" class="panel__h2">Aylık görünüm</h2>
            <p class="panel__sub">Gün başına süre · kategori</p>
          </div>
          <div class="calendar-toolbar">
            <button type="button" class="btn btn--ghost calendar-toolbar__nav" id="cal-prev" aria-label="Önceki ay">←</button>
            <h3 class="calendar-toolbar__title" id="cal-month-label">—</h3>
            <button type="button" class="btn btn--ghost calendar-toolbar__nav" id="cal-next" aria-label="Sonraki ay">→</button>
            <button type="button" class="btn btn--small" id="cal-today">Bugün</button>
          </div>
          <div class="calendar-legend">
            <span class="calendar-legend__item"><span class="calendar-legend__sw calendar-legend__sw--en"></span> YDS</span>
            <span class="calendar-legend__item"><span class="calendar-legend__sw calendar-legend__sw--tech"></span> Teknik</span>
            <span class="calendar-legend__item"><span class="calendar-legend__sw calendar-legend__sw--book"></span> Kitap</span>
            <span class="calendar-legend__item"><span class="calendar-legend__sw calendar-legend__sw--inv"></span> Yatırım</span>
            <span class="calendar-legend__item"><span class="calendar-legend__ring"></span> Seri</span>
          </div>
          <div id="calendar-root" class="calendar-grid-wrap"></div>
        </section>

      </div>
    </div>
  </div>
  <script src="js/sync-api.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
